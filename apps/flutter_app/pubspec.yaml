name: vidyalaxmi
description: "VidyaLaxmi: Cyber-India Edition — Gamified K-12 Learning Ecosystem"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Animations
  rive: ^0.14.5
  lottie: ^3.3.3

  # Backend
  supabase_flutter: ^2.8.4

  # Audio
  audioplayers: ^6.6.0

  # Haptics
  vibration: ^2.0.1

  # Fonts
  google_fonts: ^6.2.1

  # PDF viewer
  flutter_pdfview: ^1.3.4

  # Localization
  intl: ^0.20.2

  # Utilities
  shared_preferences: ^2.3.3
  connectivity_plus: ^6.1.0
  cached_network_image: ^3.4.1
  dio: ^5.7.0
  equatable: ^2.0.7
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4
  logger: ^2.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.4
  json_serializable: ^6.9.0
  freezed: ^2.5.7
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.4

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/rive/
    - assets/lottie/
    - assets/audio/
    - assets/characters/

  fonts:
    - family: Lexend
      fonts:
        - asset: assets/fonts/Lexend-Regular.ttf
          weight: 400
        - asset: assets/fonts/Lexend-Medium.ttf
          weight: 500
        - asset: assets/fonts/Lexend-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Lexend-Bold.ttf
          weight: 700
